name: cadencea_flutter
description: Cadencea - Vocal coaching and karaoke app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  go_router: ^14.0.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.0
  http: ^1.6.0
  shimmer: ^3.0.0
  just_audio: ^0.10.5
  record: ^6.2.1
  permission_handler: ^12.0.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  path_provider_foundation: 2.4.0

flutter:
  uses-material-design: true
